<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сравнение адресов аптек</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: #e8edf5 url('bg.jpg') center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 36px 40px;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.14);
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: #1a2744;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 30px;
    }

    .upload-group { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }

    .upload-row { display: flex; align-items: center; gap: 14px; }

    .upload-label {
      font-size: 0.83rem;
      font-weight: 600;
      color: #374151;
      min-width: 130px;
      line-height: 1.3;
    }

    .file-btn {
      flex: 1;
      padding: 11px 16px;
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      background: #f8fafc;
      cursor: pointer;
      font-size: 0.83rem;
      color: #64748b;
      text-align: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-btn:hover { border-color: #3b82f6; color: #3b82f6; background: #f0f7ff; }
    .file-btn.loaded { border-color: #10b981; color: #065f46; background: #ecfdf5; border-style: solid; }

    input[type="file"] { display: none; }

    .divider { height: 1px; background: #e2e8f0; margin: 4px 0 18px; }

    .btn-compare {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      letter-spacing: 0.2px;
    }
    .btn-compare:hover:not(:disabled) { background: #1d4ed8; }
    .btn-compare:disabled { background: #94a3b8; cursor: not-allowed; opacity: 0.7; }

    .progress {
      display: none;
      text-align: center;
      font-size: 0.85rem;
      color: #64748b;
      padding: 14px 0 2px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

    .stats {
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 22px;
    }

    .stat-box {
      border-radius: 12px;
      padding: 18px 10px;
      text-align: center;
    }
    .stat-box.exact  { background: #f0fdf4; border: 1.5px solid #86efac; }
    .stat-box.none   { background: #fef2f2; border: 1.5px solid #fca5a5; }

    .stat-num { font-size: 2.1rem; font-weight: 800; line-height: 1; }
    .stat-lbl { font-size: 0.72rem; color: #64748b; margin-top: 4px; font-weight: 500; }

    .stat-box.exact .stat-num { color: #15803d; }
    .stat-box.none  .stat-num { color: #dc2626; }

    .btn-download {
      display: none;
      width: 100%;
      margin-top: 16px;
      padding: 13px;
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-download:hover { background: #059669; }

    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.83rem;
      line-height: 1.5;
    }

  </style>
</head>
<body>

<div class="card">
  <h1>Сравнение адресов аптек</h1>
  <p class="subtitle">Загрузите два Excel-файла — сайт найдёт совпадения по адресам прямо в браузере</p>

  <div class="upload-group">
    <div class="upload-row">
      <span class="upload-label">Файл-источник<br><small style="font-weight:400;color:#94a3b8">Виши / ЛРП</small></span>
      <div class="file-btn" id="srcBtn" onclick="document.getElementById('srcInput').click()">
        Выбрать файл…
      </div>
      <input type="file" id="srcInput" accept=".xlsx,.xls,.csv">
    </div>

    <div class="upload-row">
      <span class="upload-label">Файл-досье<br><small style="font-weight:400;color:#94a3b8">Список аптек</small></span>
      <div class="file-btn" id="dossierBtn" onclick="document.getElementById('dossierInput').click()">
        Выбрать файл…
      </div>
      <input type="file" id="dossierInput" accept=".xlsx,.xls,.csv">
    </div>
  </div>

  <div class="divider"></div>

  <button class="btn-compare" id="compareBtn" disabled>Сравнить</button>

  <div class="progress" id="progress">Анализируем адреса…</div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="stats" id="stats">
    <div class="stat-box exact">
      <div class="stat-num" id="cntExact">0</div>
      <div class="stat-lbl">Найдено</div>
    </div>
    <div class="stat-box none">
      <div class="stat-num" id="cntNone">0</div>
      <div class="stat-lbl">Не найдено</div>
    </div>
  </div>

  <button class="btn-download" id="downloadBtn">⬇ Скачать результат (.xlsx)</button>
</div>


<script>
// ─── Состояние ────────────────────────────────────────────────
let srcRows = null, dossierRows = null, resultData = null;

// ─── Константы ────────────────────────────────────────────────
// «названия строк» — колонка адреса в файлах ЛРП/Виши, «аптеки» — в файле Виши
const ADDR_COLS = ['адрес', 'address', 'адрес аптеки', 'местонахождение',
                   'названия строк', 'название строки', 'аптеки'];
const THRESHOLD = 0.85;

// Маркеры адреса — не несут различающей информации, выкидываются из токенов
const STOP_TOKENS = new Set([
  'ул','пр','пер','бул','ш','наб','мкр','пл','туп','лин','прд',
  'б','г','д','к','с','кв','оф','пом','лит','им','имени',
  'тер','территория','х','м','п'
]);

// ─── Чтение файла ─────────────────────────────────────────────
function bindInput(inputId, btnId, stateKey) {
  document.getElementById(inputId).addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        const parsed = parseRows(raw, file.name);
        if (stateKey === 'src') srcRows = parsed;
        else dossierRows = parsed;
        markBtn(btnId, file.name);
        clearResult();
        checkReady();
      } catch (err) {
        showError(err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

// Ищем строку-заголовок в первых 15 строках файла
function findHeaderRow(raw) {
  for (let i = 0; i < Math.min(15, raw.length); i++) {
    const cells = raw[i].map(h => String(h).toLowerCase().trim());
    if (cells.some(h => ADDR_COLS.includes(h))) return i;
  }
  return -1;
}

function parseRows(raw, filename) {
  if (!raw || raw.length < 2) throw new Error(`Файл "${filename}" пустой.`);

  const headerIdx = findHeaderRow(raw);
  if (headerIdx === -1) {
    throw new Error(
      `Не найдена колонка с адресом в файле "${filename}".\n` +
      `Ожидается одно из: ${ADDR_COLS.join(', ')}.`
    );
  }

  const headers = raw[headerIdx].map(h => String(h).toLowerCase().trim());
  const addrCol = headers.findIndex(h => ADDR_COLS.includes(h));

  // Если рядом есть «город» — дописываем его перед адресом.
  // Это нужно для досье, где город и улица в разных колонках,
  // а в источнике (ЛРП/Виши) они записаны вместе.
  const cityCol = headers.findIndex(h => h === 'город');

  return raw.slice(headerIdx + 1)
    .map((row, i) => {
      // raw — оригинальное содержимое ячейки 1в1 (для вывода в результат)
      const raw    = String(row[addrCol] ?? '');
      const street = raw.trim();
      if (!street) return null;
      const city   = cityCol !== -1 ? String(row[cityCol] || '').trim() : '';
      // full — склейка для матчинга (город + улица), оригинал не трогаем
      const full   = city ? `${city} ${street}` : street;
      return {
        rowNum:  i + headerIdx + 2,
        rawAddress: raw,        // как в ячейке, без модификаций
        address: full,          // для отображения/совместимости
        key:     normalize(full)
      };
    })
    .filter(Boolean);
}

// ─── Нормализация ─────────────────────────────────────────────
// В JS «\b» не работает с кириллицей, поэтому используем явные lookaround.
// LB / RB — «левая/правая граница» слова для кириллицы и цифр.
const LB = '(?<![а-я0-9])';
const RB = '(?![а-я0-9])';
// Сборка регулярки-слова с границами
function W(body, flags = 'g') {
  return new RegExp(LB + body + RB, flags);
}

function normalize(s) {
  let r = s.toLowerCase();

  // Примечания в скобках: «(клиника К+31)», «(ТЦ Мега)»
  r = r.replace(/\([^)]*\)/g, ' ');

  // «аптека №28», «ап/п №34», «пом. 247», «офис 12», «кв. 5», «литер А», «#42»
  r = r.replace(W('аптека\\s*[#№]?\\s*\\d+\\w*'), ' ');
  r = r.replace(W('ап\\s*\\/?\\s*п\\s*[#№]?\\s*\\d+\\w*'), ' ');
  r = r.replace(W('пом(ещение)?\\.?\\s*\\d+(\\/\\d+)?\\w*'), ' ');
  r = r.replace(W('оф(ис)?\\.?\\s*\\d+\\w*'), ' ');
  r = r.replace(W('кв(артира)?\\.?\\s*\\d+\\w*'), ' ');
  r = r.replace(W('лит(ер)?\\.?\\s*[а-я]'), ' ');
  r = r.replace(/[#№]\s*\d+\w*/g, ' ');

  // Санкт-Петербург в обоих написаниях → спб
  r = r.replace(/санкт[\s\-]*петербург/g, 'спб');
  r = r.replace(W('с[\\s\\-]*петербург'), 'спб');

  // Типы населённых пунктов — выкидываем (село, посёлок и т.п.)
  r = r.replace(W('село'),    ' ');
  r = r.replace(W('деревня'), ' ');
  r = r.replace(W('пос[её]лок'), ' ');
  r = r.replace(W('хутор'),   ' ');
  r = r.replace(W('станица'), ' ');
  r = r.replace(W('кварт(ал)?'), ' ');
  r = r.replace(W('кв\\s*л'), ' ');

  // Пунктуация → пробел
  r = r.replace(/[.,;:!?"'«»]/g, ' ');
  r = r.replace(/[-—–]/g, ' ');

  // Удалить маркер «дом N» / «д N» перед числом, оставив число
  r = r.replace(new RegExp(LB + '(дом|д)\\s+(?=\\d)', 'g'), ' ');

  // Типы улиц → одна форма
  r = r.replace(W('проспект'), 'пр');
  r = r.replace(W('пр\\s*кт'), 'пр');
  r = r.replace(W('пр\\s*т'),  'пр');
  r = r.replace(W('прт'),      'пр');

  r = r.replace(W('проезд'),   'прд');
  r = r.replace(W('пр\\s*д'),  'прд');

  r = r.replace(W('улица'),    'ул');
  r = r.replace(W('переулок'), 'пер');
  r = r.replace(W('бульвар'),  'бул');
  r = r.replace(W('б\\s*р'),   'бул');
  r = r.replace(W('шоссе'),    'ш');
  r = r.replace(W('набережная'), 'наб');
  r = r.replace(W('площадь'),  'пл');
  r = r.replace(W('микрорайон'), 'мкр');
  r = r.replace(W('мкрн'),     'мкр');
  r = r.replace(W('тупик'),    'туп');
  r = r.replace(W('линия'),    'лин');

  // Корпус/строение → к/с (до слипания литер!)
  r = r.replace(W('корпус'),   'к');
  r = r.replace(W('корп'),     'к');
  r = r.replace(W('строение'), 'с');
  r = r.replace(W('строен'),   'с');
  r = r.replace(W('стр'),      'с');

  r = r.replace(W('город'),    'г');
  r = r.replace(W('московская\\s+область'), 'мо');
  r = r.replace(W('московская'), 'мо');

  // Дроби: «6 / 1» → «6/1»
  r = r.replace(/\s*\/\s*/g, '/');

  // «к 2» → «к2», «с 4» → «с4» (двукратно — для «к 2 с 4»)
  for (let i = 0; i < 2; i++) {
    r = r.replace(new RegExp(LB + '([кс])\\s+(\\d)', 'g'), '$1$2');
  }
  // «к2 с4» → «к2с4» и наоборот
  r = r.replace(new RegExp(LB + '(к\\d+)\\s+(с\\d+)', 'g'), '$1$2');
  r = r.replace(new RegExp(LB + '(с\\d+)\\s+(к\\d+)', 'g'), '$1$2');

  // Литеры дома: «75 а» → «75а» (включая «19 к» — литера К)
  r = r.replace(/(\d)\s+([а-я])(?![а-я0-9])/g, '$1$2');

  return r.replace(/\s+/g, ' ').trim();
}

function tokensOf(key) {
  return key.split(' ').filter(t => t && !STOP_TOKENS.has(t));
}

const NUM_RE = /\d+(?:\/\d+)?/g;
function numbersOf(key) {
  return new Set(key.match(NUM_RE) || []);
}

// ─── Fuzzy matching ───────────────────────────────────────────
function levenshtein(a, b) {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  // Только одна строка prev/curr для экономии памяти
  let prev = Array.from({ length: b.length + 1 }, (_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    const curr = [i];
    for (let j = 1; j <= b.length; j++) {
      curr[j] = a[i-1] === b[j-1]
        ? prev[j-1]
        : 1 + Math.min(prev[j], curr[j-1], prev[j-1]);
    }
    prev = curr;
  }
  return prev[b.length];
}

function strSim(a, b) {
  if (!a && !b) return 1;
  if (!a || !b) return 0;
  const maxLen = Math.max(a.length, b.length);
  return 1 - levenshtein(a, b) / maxLen;
}

// Доля чисел из меньшего множества, нашедшихся в большем (1.0 = все совпали)
function numberOverlap(a, b) {
  const na = numbersOf(a), nb = numbersOf(b);
  if (na.size === 0 && nb.size === 0) return 1;
  if (na.size === 0 || nb.size === 0) return 0;
  const [small, big] = na.size <= nb.size ? [na, nb] : [nb, na];
  let hit = 0;
  for (const n of small) if (big.has(n)) hit++;
  return hit / small.size;
}

function similarity(a, b) {
  if (a === b) return 1;

  const ta = new Set(tokensOf(a));
  const tb = new Set(tokensOf(b));
  if (ta.size === 0 || tb.size === 0) return strSim(a, b);

  let inter = 0;
  for (const t of ta) if (tb.has(t)) inter++;
  const union = ta.size + tb.size - inter;
  const jacc = inter / union;
  const ss = strSim(a, b);
  let score = Math.max(jacc, ss);

  const nm = numberOverlap(a, b);

  // Асимметричная защита: меньший набор почти полностью внутри большего
  // и номера домов сходятся → это один адрес с лишним микрорайоном/районом
  const pA = inter / ta.size;
  const pB = inter / tb.size;
  const maxContain = Math.max(pA, pB);
  if (nm >= 0.99 && maxContain >= 0.75 && inter >= 2) {
    score = Math.max(score, 0.90);
  }

  // Штраф: ни одно число не совпало → почти наверняка другой дом
  if (nm === 0 && (numbersOf(a).size > 0 || numbersOf(b).size > 0)) {
    score *= 0.55;
  }

  return score;
}

// ─── Индекс токенов для ускорения ────────────────────────────
function buildTokenIndex(rows) {
  const idx = new Map();
  rows.forEach((r, i) => {
    tokensOf(r.key).forEach(t => {
      if (t.length < 3) return;
      if (!idx.has(t)) idx.set(t, []);
      idx.get(t).push(i);
    });
  });
  return idx;
}

function getCandidates(key, tokenIdx, fallback) {
  const tokens = tokensOf(key).filter(t => t.length >= 3);
  const seen = new Set();
  tokens.forEach(t => {
    (tokenIdx.get(t) || []).forEach(i => seen.add(i));
  });
  return seen.size > 0 ? [...seen] : fallback;
}

// ─── Основное сравнение ───────────────────────────────────────
function compare() {
  if (!srcRows || !dossierRows) return;
  showError('');
  document.getElementById('progress').style.display = 'block';
  document.getElementById('compareBtn').disabled = true;
  document.getElementById('stats').style.display = 'none';
  document.getElementById('downloadBtn').style.display = 'none';

  // Дать браузеру отрисовать UI, потом считать
  setTimeout(() => {
    try {
      const tokenIdx = buildTokenIndex(dossierRows);
      const allIdxs = dossierRows.map((_, i) => i);

      resultData = srcRows.map(src => {
        const candidates = getCandidates(src.key, tokenIdx, allIdxs);
        let bestScore = -1, bestMatch = null;
        for (const i of candidates) {
          const d = dossierRows[i];
          const score = similarity(src.key, d.key);
          if (score > bestScore) { bestScore = score; bestMatch = d; }
        }

        const found = bestScore >= THRESHOLD;
        return {
          'Адрес из источника': src.rawAddress,
          // 1в1 как в ячейке «Адрес аптеки» в файле досье
          'Адрес аптеки':       found ? bestMatch.rawAddress : '',
          'Статус':             found ? 'НАЙДЕНО' : 'НЕ НАЙДЕНО',
          'Похожесть':          Math.round(bestScore * 100) + '%',
          'Строка источника':   src.rowNum,
          'Строка досье':       found ? bestMatch.rowNum : '',
          'Ключ источника':     src.key,
          'Ключ досье':         found ? bestMatch.key : ''
        };
      });

      // Счётчики
      let exact = 0, none = 0;
      resultData.forEach(r => {
        if (r['Статус'] === 'НАЙДЕНО') exact++;
        else none++;
      });

      document.getElementById('cntExact').textContent = exact;
      document.getElementById('cntNone').textContent  = none;
      document.getElementById('stats').style.display = 'grid';
      document.getElementById('downloadBtn').style.display = 'block';

    } catch (err) {
      showError('Ошибка сравнения: ' + err.message);
    } finally {
      document.getElementById('progress').style.display = 'none';
      document.getElementById('compareBtn').disabled = false;
    }
  }, 60);
}

// ─── Скачать Excel ────────────────────────────────────────────
function downloadResult() {
  if (!resultData) return;
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(resultData);

  // Минимальная ширина колонок
  const colWidths = Object.keys(resultData[0]).map(k => ({ wch: Math.max(k.length, 18) }));
  ws['!cols'] = colWidths;

  XLSX.utils.book_append_sheet(wb, ws, 'Результат');
  XLSX.writeFile(wb, 'result_addresses.xlsx');
}

// ─── UI helpers ───────────────────────────────────────────────
function markBtn(id, filename) {
  const btn = document.getElementById(id);
  const name = filename.length > 30 ? filename.slice(0, 28) + '…' : filename;
  btn.textContent = '✓ ' + name;
  btn.classList.add('loaded');
}

function checkReady() {
  document.getElementById('compareBtn').disabled = !(srcRows && dossierRows);
}

function clearResult() {
  resultData = null;
  document.getElementById('stats').style.display = 'none';
  document.getElementById('downloadBtn').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.style.display = msg ? 'block' : 'none';
  el.textContent = msg;
}

// ─── Подключение кнопок ───────────────────────────────────────
bindInput('srcInput',     'srcBtn',     'src');
bindInput('dossierInput', 'dossierBtn', 'dossier');
document.getElementById('compareBtn').addEventListener('click', compare);
document.getElementById('downloadBtn').addEventListener('click', downloadResult);
</script>
</body>
</html>
